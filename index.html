<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Experiencia para Ti ✨</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Optima', 'Segoe UI', serif; background-color: var(--dark); color: var(--white); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Contenedor Principal */
        #main-card { width: 85%; max-width: 400px; padding: 40px 20px; text-align: center; border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 2px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); }

        /* Pantalla de Introducción */
        #intro-screen { animation: fadeIn 2s ease-in; }
        .lotus { font-size: 40px; margin-bottom: 20px; color: var(--gold); }
        h1 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 1.5rem; margin-bottom: 30px; }
        .subtitle { font-style: italic; color: #aaa; margin-bottom: 40px; line-height: 1.6; }

        /* Botones Elegantes */
        .btn-gold { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 15px 40px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.4s; font-size: 14px; }
        .btn-gold:hover { background: var(--gold); color: var(--dark); }

        /* Sección Trivia */
        .trivia-btn { background: rgba(197, 160, 89, 0.1); color: var(--white); border: 1px solid rgba(197, 160, 89, 0.5); padding: 12px; margin: 10px 0; width: 100%; cursor: pointer; text-align: left; padding-left: 20px; }
        .hidden { display: none; }

        /* Invitación Final */
        .final-box { border: 1px solid var(--gold); padding: 20px; margin-top: 20px; background: rgba(197, 160, 89, 0.05); }
        img { width: 100%; margin-top: 20px; filter: sepia(0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="main-card">
    <div id="intro-screen">
        <div class="lotus">🌸</div>
        <h1>Un nuevo horizonte</h1>
        <p class="subtitle">"La verdadera aventura comienza cuando nos atrevemos a probar algo diferente por primera vez."</p>
        <button class="btn-gold" onclick="startExperience()">Descubrir</button>
    </div>

    <div id="quiz-section" class="hidden">
        <p id="progress" style="color: var(--gold); font-size: 12px; letter-spacing: 2px;"></p>
        <h2 id="question" style="font-weight: 300; margin-bottom: 30px;"></h2>
        <div id="options"></div>
        <p id="feedback" style="margin-top: 20px; font-size: 14px; min-height: 40px;"></p>
    </div>

    <div id="final-section" class="hidden">
        <h1 style="color: var(--gold);">Invitación para mi amor</h1>
        <div class="final-box">
            <p style="letter-spacing: 1px;">SÁBADO 18 DE ABRIL</p>
            <p style="font-size: 20px; color: var(--gold);">7:30 PM</p>
            <p style="font-size: 14px; color: #888;">Nuestra primera experiencia Sushi & Teppanyaki</p>
        </div>
        <p style="margin-top: 30px; font-style: italic;">"Porque contigo, cada primera vez es perfecta."</p>
        <p style="font-size: 12px; letter-spacing: 2px;">TE AMO, SANTIAGO ❤️</p>
    </div>
</div>

<script>
    const questions = [
        { q: "¿En qué país nació el arte del Sushi?", a: ["China", "Japón", "Vietnam"], c: 1, fact: "¡Correcto! Japón lo convirtió en una obra de arte." },
        { q: "El Teppanyaki es cocinar frente a ti sobre...", a: ["Piedras calientes", "Una plancha de acero", "Brasas de madera"], c: 1, fact: "¡Exacto! Es todo un espectáculo de fuego y acero." },
        { q: "¿Cuál es la función del jengibre (Gari) en el sushi?", a: ["Darle picante", "Limpiar el paladar", "Adornar el plato"], c: 1, fact: "Así es. Sirve para limpiar el sabor entre cada pieza." },
        { q: "¿Cómo se llama el maestro experto en sushi?", a: ["Sensei", "Itamae", "Shifu"], c: 1, fact: "¡Impresionante! El 'Itamae' estudia años para dominarlo." }
    ];

    let currentQ = 0;

    function startExperience() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[currentQ];
        document.getElementById('progress').innerText = `PASO ${currentQ + 1} DE ${questions.length}`;
        document.getElementById('question').innerText = qData.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        document.getElementById('feedback').innerText = '';

        qData.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'trivia-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(i) {
        const qData = questions[currentQ];
        const feedback = document.getElementById('feedback');
        
        if(i === qData.c) {
            feedback.style.color = "var(--gold)";
            feedback.innerText = qData.fact;
        } else {
            feedback.style.color = "#888";
            feedback.innerText = "Interesante... pero aprenderemos que es: " + qData.a[qData.c];
        }

        setTimeout(() => {
            currentQ++;
            if(currentQ < questions.length) {
                loadQuestion();
            } else {
                showFinal();
            }
        }, 2200);
    }

    function showFinal() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('final-section').classList.remove('hidden');
    }
</script>
</body>
</html>
